name: package-json-sanity

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  validate-package-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate package.json structure and duplicate keys
        run: node scripts/check-package-json.mjs
